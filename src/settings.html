<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI GirlFriend Settings</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="settings-body">
    <main class="settings-shell">
      <header class="settings-header">
        <div>
          <h1>Settings</h1>
          <p id="settingsStatus">Configure Luna</p>
        </div>
      </header>

      <section class="settings-section">
        <h2>AI</h2>
        <div class="setting-row">
          <label for="providerSelect">Provider</label>
          <select id="providerSelect">
            <option value="offline">Offline</option>
            <option value="openai">OpenAI</option>
            <option value="ollama">Ollama local</option>
          </select>
        </div>
        <div class="setting-row">
          <label for="modelInput">Model</label>
          <input id="modelInput" type="text" value="llama3.1" />
        </div>
        <div class="setting-row">
          <label for="openaiKeyInput">API key</label>
          <input id="openaiKeyInput" type="password" autocomplete="off" placeholder="sk-..." />
        </div>
        <div class="setting-row tall-row">
          <label for="personaPromptInput">Persona</label>
          <textarea id="personaPromptInput" rows="5"></textarea>
        </div>
      </section>

      <section class="settings-section">
        <h2>Desktop</h2>
        <div class="setting-row">
          <label>Avatar</label>
          <div class="segmented stretch" aria-label="Avatar position">
            <button id="leftSideButton" type="button">Left</button>
            <button id="rightSideButton" type="button">Right</button>
          </div>
        </div>
        <div class="setting-row">
          <label for="proactiveToggle">Proactive</label>
          <input id="proactiveToggle" type="checkbox" />
        </div>
        <div class="setting-row">
          <label for="autoLaunchToggle">Auto start</label>
          <input id="autoLaunchToggle" type="checkbox" />
        </div>
      </section>

      <section class="settings-section">
        <h2>Memory</h2>
        <form class="memory-composer" id="memoryComposer">
          <input
            id="memoryInput"
            type="text"
            autocomplete="off"
            placeholder="Add a memory"
            aria-label="Memory"
          />
          <button type="submit">Add</button>
        </form>
        <input
          class="memory-search"
          id="memorySearchInput"
          type="search"
          autocomplete="off"
          placeholder="Search memories"
          aria-label="Search memories"
        />
        <div class="memory-list" id="memoryList"></div>
        <button class="secondary-button danger-text" id="clearMemoriesButton" type="button">
          Clear memories
        </button>
      </section>

      <section class="settings-section">
        <h2>Workspace</h2>
        <div class="setting-row">
          <label for="imageProviderSelect">Image</label>
          <select id="imageProviderSelect">
            <option value="placeholder">Placeholder SVG</option>
            <option value="openai">OpenAI Images</option>
          </select>
        </div>
        <div class="setting-row">
          <label for="imageModelInput">Img model</label>
          <input id="imageModelInput" type="text" value="gpt-image-2" />
        </div>
        <div class="setting-row">
          <label for="imageSizeSelect">Size</label>
          <select id="imageSizeSelect">
            <option value="1024x1024">1024x1024</option>
            <option value="1536x1024">1536x1024</option>
            <option value="1024x1536">1024x1536</option>
            <option value="auto">auto</option>
          </select>
        </div>
        <div class="setting-row">
          <label>Folder</label>
          <button id="folderButton" type="button">Choose</button>
        </div>
        <p class="folder-path" id="folderPath">No folder selected</p>
        <button class="agent-button" id="portraitButton" type="button">
          Create self portrait file
        </button>
      </section>
    </main>
    <script src="./settings.js"></script>
  </body>
</html>
