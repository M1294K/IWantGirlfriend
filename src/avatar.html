<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avatar</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="avatar-body">
    <button class="avatar-stage" id="avatarButton" aria-label="Open chat">
      <div class="speech" id="speech"></div>
      <div class="avatar mood-neutral" id="avatar">
        <div class="hair"></div>
        <div class="face">
          <div class="eyes">
            <span></span>
            <span></span>
          </div>
          <div class="mouth"></div>
        </div>
        <div class="body"></div>
      </div>
    </button>
    <script src="./avatar.js"></script>
  </body>
</html>
