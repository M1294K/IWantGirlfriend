<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI GirlFriend</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="chat-body">
    <main class="shell chat-shell">
      <header class="topbar">
        <div>
          <h1 id="personaName">Luna</h1>
          <p id="statusLine">desktop companion</p>
        </div>
        <div class="top-actions">
          <button class="icon-button" id="settingsButton" type="button" title="Open settings">
            Settings
          </button>
          <button class="icon-button danger" id="quitButton" type="button" title="Quit app">
            Quit
          </button>
        </div>
      </header>

      <section class="messages" id="messages"></section>

      <form class="composer" id="composer">
        <input
          id="messageInput"
          type="text"
          autocomplete="off"
          placeholder="Type a message"
          aria-label="Message"
        />
        <button type="submit">Send</button>
      </form>
    </main>
    <script src="./chat.js"></script>
  </body>
</html>
