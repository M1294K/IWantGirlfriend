<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI GirlFriend</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="chat-body">
    <main class="shell">
      <header class="topbar">
        <div>
          <h1 id="personaName">Luna</h1>
          <p id="statusLine">desktop companion</p>
        </div>
        <div class="top-actions">
          <div class="segmented" aria-label="Avatar position">
            <button id="leftSideButton" type="button">L</button>
            <button id="rightSideButton" type="button">R</button>
          </div>
          <button class="icon-button danger" id="quitButton" type="button" title="Quit app">
            Quit
          </button>
        </div>
      </header>

      <section class="messages" id="messages"></section>

      <form class="composer" id="composer">
        <input
          id="messageInput"
          type="text"
          autocomplete="off"
          placeholder="Type a message"
          aria-label="Message"
        />
        <button type="submit">Send</button>
      </form>

      <section class="panel">
        <div class="setting-row">
          <label for="providerSelect">AI</label>
          <select id="providerSelect">
            <option value="offline">Offline</option>
            <option value="openai">OpenAI</option>
            <option value="ollama">Ollama local</option>
          </select>
        </div>
        <div class="setting-row">
          <label for="modelInput">Model</label>
          <input id="modelInput" type="text" value="llama3.1" />
        </div>
        <div class="setting-row">
          <label for="openaiKeyInput">API key</label>
          <input id="openaiKeyInput" type="password" autocomplete="off" placeholder="sk-..." />
        </div>
        <div class="setting-row tall-row">
          <label for="personaPromptInput">Persona</label>
          <textarea id="personaPromptInput" rows="4"></textarea>
        </div>
        <div class="setting-row">
          <label for="proactiveToggle">Proactive</label>
          <input id="proactiveToggle" type="checkbox" />
        </div>
        <div class="setting-row">
          <label for="autoLaunchToggle">Auto start</label>
          <input id="autoLaunchToggle" type="checkbox" />
        </div>
        <div class="setting-row">
          <label>Folder</label>
          <button id="folderButton" type="button">Choose</button>
        </div>
        <p class="folder-path" id="folderPath">No folder selected</p>
        <button class="agent-button" id="portraitButton" type="button">
          Create self portrait file
        </button>
      </section>
    </main>
    <script src="./chat.js"></script>
  </body>
</html>
